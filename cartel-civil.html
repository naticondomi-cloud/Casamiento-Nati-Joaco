<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cartel Civil · NJ</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F8F4ED;
      font-family: 'Jost', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .pagina {
      width: 210mm; min-height: 297mm;
      background: #F8F4ED;
      display: flex; align-items: center; justify-content: center;
      padding: 14mm;
    }
    .cartel {
      width: 100%;
      border: 1.5px solid #DDD5C4;
      padding: 48px 44px;
      text-align: center;
      position: relative;
    }
    .corner { position: absolute; width: 36px; height: 36px; border-color: #2E4A35; border-style: solid; }
    .tl { top: 12px; left: 12px; border-width: 1.5px 0 0 1.5px; }
    .tr { top: 12px; right: 12px; border-width: 1.5px 1.5px 0 0; }
    .bl { bottom: 12px; left: 12px; border-width: 0 0 1.5px 1.5px; }
    .br { bottom: 12px; right: 12px; border-width: 0 1.5px 1.5px 0; }

    .mono {
      font-family: 'Playfair Display', serif; font-weight: 700;
      color: #2E4A35; font-size: 72px;
      display: flex; justify-content: center; align-items: flex-start;
      letter-spacing: -3px; margin-bottom: 20px;
    }
    .mono .j { margin-top: 20px; }

    .eyebrow {
      font-size: 12px; letter-spacing: 0.32em; text-transform: uppercase;
      color: #8A9488; margin-bottom: 18px; font-weight: 400;
    }
    .titulo {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 46px; color: #1E2820; margin-bottom: 12px; line-height: 1.15;
    }
    .subtitulo {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 22px; color: #4A5448; line-height: 1.65; margin-bottom: 36px;
    }
    .divider {
      width: 52px; height: 0.5px; background: #C8AE88;
      margin: 0 auto 36px;
    }
    .qr-wrap {
      background: white; border-radius: 2px;
      padding: 20px; display: inline-block;
      margin-bottom: 32px; border: 0.5px solid #DDD5C4;
    }
    .qr-wrap img { width: 240px; height: 240px; display: block; }

    .instruccion {
      font-size: 16px; letter-spacing: 0.04em; color: #4A5448;
      line-height: 1.8; margin-bottom: 36px; font-weight: 300;
    }
    .instruccion strong { color: #2E4A35; font-weight: 500; font-size: 17px; }

    .gracias {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 26px; color: #2E4A35; margin-bottom: 20px; line-height: 1.4;
    }
    .firma {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 18px; color: #8A9488;
    }

    @media print {
      body { background: white; min-height: auto; }
      .pagina { width: 210mm; min-height: 297mm; padding: 14mm; }
      @page { size: A4; margin: 0; }
    }
  </style>
</head>
